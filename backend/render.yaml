services:
  - type: web
    name: attentionx-backend
    env: docker
    plan: free # Free Tier (512MB RAM). This will 'sleep' after 15 mins of inactivity. Tiny Whisper is used to fit this limit.
    region: frankfurt # Choose closest region to users
    dockerCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      
      # Python Optimization variables
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: MOVIEPY_FFMPEG_BINARY
        value: "ffmpeg"
