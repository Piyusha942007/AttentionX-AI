services:
  - type: web
    name: attentionx-backend
    env: docker
    plan: starter # Starter ($7/mo) provides 512MB RAM. Tiny Whisper is now forced to fit this limit. 512MB is the absolute minimum; if it OOMs on long videos, you'll need the 1GB RAM tier.
    region: frankfurt # Choose closest region to users
    dockerCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      
      # Python Optimization variables
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: MOVIEPY_FFMPEG_BINARY
        value: "ffmpeg"
